<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="description" content="NewsFlash – Real-time headlines, breaking news, search by country or state, and bookmarks."/>
  <title>NewsFlash – Real-Time News App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
</head>
<body>
<div class="app-container">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="header">
    <span class="logo">News<span>Flash</span></span>
    <div class="header-actions">
      <button id="themeToggle" class="icon-btn" title="Toggle dark/light mode" aria-label="Toggle theme">
        <!-- icon injected by JS -->
      </button>
    </div>
  </header>

  <!-- ── Search Bar ─────────────────────────────────────────────────────── -->
  <div class="search-wrap">
    <div class="search-box">
      <!-- Search Icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInput" type="search" autocomplete="off"
             placeholder="India, USA, Uttar Pradesh, Technology…" aria-label="Search news"/>
      <button id="clearSearch" class="icon-btn" style="width:24px;height:24px;border-radius:50%" title="Clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <button id="searchBtn" class="icon-btn" style="width:30px;height:30px;background:var(--primary);color:#fff;border-radius:8px" title="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Category Bar ───────────────────────────────────────────────────── -->
  <nav class="cat-bar" aria-label="News categories">
    <button class="cat-pill active" data-cat="all"           onclick="selectCategory('all','')">🌐 All</button>
    <button class="cat-pill"        data-cat="business"      onclick="selectCategory('business','business')">💼 Business</button>
    <button class="cat-pill"        data-cat="entertainment" onclick="selectCategory('entertainment','entertainment')">🎬 Entertainment</button>
    <button class="cat-pill"        data-cat="health"        onclick="selectCategory('health','health')">🏥 Health</button>
    <button class="cat-pill"        data-cat="science"       onclick="selectCategory('science','science')">🔬 Science</button>
    <button class="cat-pill"        data-cat="sports"        onclick="selectCategory('sports','sports')">⚽ Sports</button>
    <button class="cat-pill"        data-cat="technology"    onclick="selectCategory('technology','technology')">💻 Technology</button>
    <button class="cat-pill"        data-cat="general"       onclick="selectCategory('general','general')">🏛️ Politics</button>
  </nav>

  <!-- ── Breaking News Carousel ─────────────────────────────────────────── -->
  <section id="breakingWrap" class="breaking-wrap" style="display:none">
    <div class="breaking-label">🔴 &nbsp;BREAKING NEWS</div>
    <div id="breakingCarousel" class="breaking-carousel"></div>
    <div id="breakingDots" class="breaking-dots"></div>
  </section>

  <!-- ── Section Title + Sort ───────────────────────────────────────────── -->
  <div class="section-title">
    <span id="titleText">Top Headlines</span>
    <select id="sortSelect" class="sort-select" style="display:none" aria-label="Sort by">
      <option value="popularity">🔥 Popular</option>
      <option value="relevancy">✅ Relevant</option>
      <option value="publishedAt">🕐 Latest</option>
    </select>
  </div>

  <!-- ── News Feed ──────────────────────────────────────────────────────── -->
  <main id="newsFeed" class="news-feed"></main>

</div><!-- /app-container -->

<!-- ── Bottom Tab Bar ────────────────────────────────────────────────────── -->
<nav class="tab-bar" aria-label="Main navigation">
  <button id="tabHome" class="tab-item active" aria-label="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Home
  </button>
  <button id="tabSearch" class="tab-item" aria-label="Search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Search
  </button>
  <button id="tabBookmarks" class="tab-item" aria-label="Bookmarks">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>
    Bookmarks
  </button>
</nav>

<!-- ── Article Modal (inline browser) ───────────────────────────────────── -->
<div id="articleModal" class="article-modal" role="dialog" aria-modal="true" aria-label="Article viewer">
  <div class="modal-header">
    <button class="icon-btn" id="closeModal" title="Close" aria-label="Close article">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>
    <h4 id="modalTitle">Article</h4>
    <div class="modal-actions">
      <button id="modalShareBtn" class="icon-btn" title="Share">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <button id="modalBmBtn" class="icon-btn" title="Bookmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>
  </div>
  <iframe id="modalIframe" class="modal-iframe" title="Article content" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<!-- ── Bookmarks Panel ───────────────────────────────────────────────────── -->
<div id="bookmarksPanel" class="panel" role="dialog" aria-modal="true" aria-label="Saved bookmarks">
  <div class="panel-header">
    <button class="icon-btn" id="closeBookmarks" title="Close" aria-label="Close bookmarks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>
    <h2>Bookmarks</h2>
  </div>
  <div id="bookmarksFeed" class="panel-content"></div>
</div>

<!-- ── Toast ──────────────────────────────────────────────────────────────── -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
